server:
  port: 8082
spring:
  application:
    name: smartlife
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://127.0.0.1:3306/hmdp?useSSL=false&serverTimezone=UTC&characterEncoding=UTF-8
    username: root
    password: 123456
  data:
    redis:
      host: localhost
      port: 6379
      password: 123456
      lettuce:
        pool:
          max-active: 10
          max-idle: 10
          min-idle: 1
          time-between-eviction-runs: 10s
  jackson:
    default-property-inclusion: non_null
  kafka:
    bootstrap-servers: 192.168.29.128:9092
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer
    consumer:
      group-id: smartlife-group
      auto-offset-reset: latest
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.springframework.kafka.support.serializer.JsonDeserializer
      properties:
        spring.json.trusted.packages: "*"
smartlife:
  cache:
    shop-local-ttl-seconds: 60
  ai:
    enabled: false
    base-url: https://dashscope.aliyuncs.com/compatible-mode/v1
    api-key: your-api-key
    model: qwen-plus
  seckill:
    order-topic: smartlife.seckill.order
    cache-rebuild-topic: smartlife.cache.rebuild
mybatis-plus:
  type-aliases-package: com.entity
logging:
  level:
    com: debug
